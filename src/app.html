<!doctype html>
<html lang="en" data-theme="dark" data-accent="sand">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				function normalizeAccent(accent) {
					if (accent === 'sand' || accent === 'lavender' || accent === 'mauve' || accent === 'rose') {
						return accent;
					}

					if (accent === 'sky') return 'lavender';
					if (accent === 'amber' || accent === 'mint') return 'sand';
					if (accent === 'rose') return 'rose';

					return 'sand';
				}

				var t = localStorage.getItem('techy-theme');
				// Migrate old three-theme names to the new dark/light model
				if (t === 'night') t = 'dark';
				else if (t === 'paper' || t === 'mist') t = 'light';
				else if (t !== 'dark' && t !== 'light') t = 'dark';
				var a = normalizeAccent(localStorage.getItem('techy-accent'));
				document.documentElement.setAttribute('data-theme', t);
				document.documentElement.setAttribute('data-accent', a);
			} catch (e) {}
		</script>
		<link rel="icon" href="/favicon.ico" sizes="48x48" />
		<link rel="icon" href="/pwa-icon-source.svg" sizes="any" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
